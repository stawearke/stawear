    async function loadProducts() {
        try {
            const { data, error } = await supabase
                .from('products')
                .select('*')
                .order('id');
            
            if (error) throw error;
            
            if (data && data.length > 0) {
                products = data;
            } else {
                // Insert default products
                products = getDefaultProducts();
                await insertDefaultProducts();
            }
        } catch (error) {
            console.error('Error loading products:', error);
            // Fallback to localStorage
            const saved = localStorage.getItem('stawearProducts');
            products = saved ? JSON.parse(saved) : getDefaultProducts();
        }
        
        document.getElementById('productCount').textContent = products.length;
    }

    async function loadOrders() {

            orders = saved ? JSON.parse(saved) : [];

    function extractCustomers() {
        const customerMap = new Map();
        orders.forEach(order => {
            if (!customerMap.has(order.customer_email)) {
                customerMap.set(order.customer_email, {
                    name: order.customer_name,
                    email: order.customer_email,
                    phone: order.customer_phone,
                    orders: 1,
                    totalSpent: order.total,
                    lastOrder: order.date
                });
            } else {
                const customer = customerMap.get(order.customer_email);
                customer.orders++;
                customer.totalSpent += order.total;
            }
        });
        customers = Array.from(customerMap.values());
        document.getElementById('customerCount').textContent = customers.length;
    }

    // ===== PRODUCT CRUD =====
    function openProductModal(productId = null) {
        document.getElementById('productModal').classList.add('active');
        
        if (productId) {
            const product = products.find(p => p.id === productId);
            if (product) {
                document.getElementById('productId').value = product.id;
                document.getElementById('productName').value = product.name;
                document.getElementById('productCategory').value = product.category;
                document.getElementById('productPrice').value = product.price;
                document.getElementById('productOriginalPrice').value = product.original_price || '';
                document.getElementById('productDescription').value = product.description;
                document.getElementById('productBadge').value = product.badge || '';
                document.getElementById('productImage').value = product.image || '';
                
                // Set stock values
                document.getElementById('sizeS').value = product.stock?.S || 0;
                document.getElementById('sizeM').value = product.stock?.M || 0;
                document.getElementById('sizeL').value = product.stock?.L || 0;
                document.getElementById('sizeXL').value = product.stock?.XL || 0;
                document.getElementById('sizeXXL').value = product.stock?.XXL || 0;
            }
        } else {
            document.getElementById('productForm').reset();
            document.getElementById('productId').value = '';
        }
    }

    function closeProductModal() {
        document.getElementById('productModal').classList.remove('active');
    }

    async function saveProduct(event) {
        event.preventDefault();
        
        const productId = document.getElementById('productId').value;
        
        // Get stock values
        const stock = {
            S: parseInt(document.getElementById('sizeS').value) || 0,
            M: parseInt(document.getElementById('sizeM').value) || 0,
            L: parseInt(document.getElementById('sizeL').value) || 0,
            XL: parseInt(document.getElementById('sizeXL').value) || 0,
            XXL: parseInt(document.getElementById('sizeXXL').value) || 0
        };
        
        const productData = {
            id: productId ? parseInt(productId) : Date.now(),
            name: document.getElementById('productName').value,
            category: document.getElementById('productCategory').value,
            price: parseInt(document.getElementById('productPrice').value),
            original_price: parseInt(document.getElementById('productOriginalPrice').value) || null,
            description: document.getElementById('productDescription').value,
            badge: document.getElementById('productBadge').value || null,
            image: document.getElementById('productImage').value || 'https://via.placeholder.com/500',
            stock: stock,
            sizes: Object.keys(stock).filter(size => stock[size] > 0)
        };
        
        try {
            if (productId) {
                // Update existing product
                const { error } = await supabase
                    .from('products')
                    .update(productData)
                    .eq('id', parseInt(productId));
                
                if (error) throw error;
            } else {
                // Insert new product
                const { error } = await supabase
                    .from('products')
                    .insert([productData]);
                
                if (error) throw error;
            }
            
            await loadProducts();
            closeProductModal();
            renderProducts();
            showToast('Product saved successfully!', 'success');
            
        } catch (error) {
            console.error('Error saving product:', error);
            showToast('Error saving product', 'error');
        }
    }

    async function deleteProduct(productId) {
        if (confirm('Delete this product?')) {
            try {
                const { error } = await supabase
                    .from('products')
                    .delete()
                    .eq('id', productId);
                
                if (error) throw error;
                
                await loadProducts();
                renderProducts();
                showToast('Product deleted', 'warning');
                
            } catch (error) {
                console.error('Error deleting product:', error);
                showToast('Error deleting product', 'error');
            }
        }
    }

    function filterOrders(status) {
        if (status === 'all') {
            document.getElementById('ordersTable').innerHTML = renderOrdersTable(orders);
        } else {
            const filtered = orders.filter(o => o.status === status);
            document.getElementById('ordersTable').innerHTML = renderOrdersTable(filtered);
        }
    }

    async function updateOrderStatus(orderId, newStatus) {
        const order = orders.find(o => o.id === orderId);
        if (order) {
            try {
                const { error } = await supabase
                    .from('orders')
                    .update({ status: newStatus })
                    .eq('id', orderId);
                
                if (error) throw error;
                
                order.status = newStatus;
                
                // Send email notification
                emailjs.send(window.EMAILJS_SERVICE_ID, window.ORDER_TEMPLATE, {
                    to_email: order.customer_email,
                    to_name: order.customer_name,
                    customerName: order.customer_name,
                    orderId: order.id,
                    orderDate: new Date(order.date).toLocaleString(),
                    orderStatus: newStatus,
                    trackingUrl: window.location.origin + "/?track=" + order.id,
                    from_name: "Stawear Kenya"
                }).catch(error => console.log('Email error:', error));
                
                updateNotificationBadge();
                showToast('Order status updated', 'success');
                
            } catch (error) {
                console.error('Error updating order:', error);
                showToast('Error updating order', 'error');
            }
        }
    }

                                <td>${customer.name}</td>
                                <td>
                                    ${customer.email}<br>
                                    <small>${customer.phone}</small>
                                </td>
                                <td>${customer.orders}</td>
                                <td>Ksh ${customer.totalSpent.toLocaleString()}</td>
                                <td>${new Date(customer.lastOrder).toLocaleDateString()}</td>
                                <td>
                                    <button class="action-btn view-btn" onclick="viewCustomer('${customer.email}')">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
        
        document.getElementById('contentArea').innerHTML = html;
    }

    function searchCustomers(term) {
        const filtered = customers.filter(c => 
            c.name.toLowerCase().includes(term.toLowerCase()) ||
            c.email.toLowerCase().includes(term.toLowerCase()) ||
            (c.phone && c.phone.includes(term))
        );
        
        document.getElementById('customersTable').innerHTML = filtered.map(customer => `
            <tr>
                <td>${customer.name}</td>
                <td>${customer.email}<br><small>${customer.phone}</small></td>
                <td>${customer.orders}</td>
                <td>Ksh ${customer.totalSpent.toLocaleString()}</td>
                <td>${new Date(customer.lastOrder).toLocaleDateString()}</td>
                <td><button class="action-btn view-btn" onclick="viewCustomer('${customer.email}')">View</button></td>
            </tr>
        `).join('');
    }

    function viewCustomer(email) {
        const customerOrders = orders.filter(o => o.customer_email === email);
        const totalSpent = customerOrders.reduce((sum, o) => sum + o.total, 0);
        showToast(`${customerOrders.length} orders, Total: Ksh ${totalSpent}`, 'info');
    }

    // ===== BRANDING REQUESTS =====
    function renderBrandingRequests() {
        const html = `
            <div class="table-container">
                <div class="table-header">
                    <h3>Custom Branding Requests</h3>
                </div>
                
                <table>
                    <thead>
                        <tr>
                            <th>Date</th>
                            <th>Customer</th>
                            <th>Dojang/Team</th>
                            <th>Item</th>
                            <th>Quantity</th>
                            <th>Branding</th>
                            <th>Status</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${brandingRequests.map(request => `
                            <tr>
                                <td>${new Date(request.date).toLocaleDateString()}</td>
                                <td>${request.name}<br><small>${request.phone}</small></td>
                                <td>${request.dojang || 'N/A'}</td>
                                <td>${request.item_type}</td>
                                <td>${request.quantity}</td>
                                <td>${request.branding_type || 'N/A'}</td>
                                <td><span class="status-badge status-pending">${request.status || 'pending'}</span></td>
                                <td>
                                    <button class="action-btn view-btn" onclick="viewBrandingRequest(${request.id})">
                                        <i class="fas fa-eye"></i>
                                    </button>
                                </td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
        `;
        
        document.getElementById('contentArea').innerHTML = html;
    }

    function viewBrandingRequest(id) {
        const request = brandingRequests.find(r => r.id === id);
        if (request) {
            const details = document.getElementById('brandingDetails');
            details.innerHTML = `
                <div style="margin-bottom: 20px;">
                    <h4>Customer Details</h4>
                    <p><strong>Name:</strong> ${request.name}</p>
                    <p><strong>Email:</strong> ${request.email}</p>
                    <p><strong>Phone:</strong> ${request.phone}</p>
                    <p><strong>Dojang/Team:</strong> ${request.dojang || 'N/A'}</p>
                </div>
                
                <div style="margin-bottom: 20px;">
                    <h4>Request Details</h4>
                    <p><strong>Item:</strong> ${request.item_type}</p>
                    <p><strong>Quantity:</strong> ${request.quantity}</p>
                    <p><strong>Branding Type:</strong> ${request.branding_type || 'N/A'}</p>
                    <p><strong>Description:</strong> ${request.description}</p>
                    <p><strong>Date:</strong> ${new Date(request.date).toLocaleString()}</p>
                </div>
                
                <div style="display: flex; gap: 10px;">
                    <button class="btn btn-success" onclick="markBrandingComplete(${request.id})">Mark Complete</button>
                    <button class="btn btn-warning" onclick="contactCustomer('${request.phone}')">Contact Customer</button>
                </div>
            `;
            document.getElementById('brandingModal').classList.add('active');
        }
    }

    function closeBrandingModal() {
        document.getElementById('brandingModal').classList.remove('active');
    }

    async function markBrandingComplete(id) {
        const request = brandingRequests.find(r => r.id === id);
        if (request) {
            try {
                const { error } = await supabase
                    .from('branding_requests')
                    .update({ status: 'completed' })
                    .eq('id', id);
                
                if (error) throw error;
                
                request.status = 'completed';
                await loadBrandingRequests();
                closeBrandingModal();
                renderBrandingRequests();
                updateNotificationBadge();
                showToast('Request marked complete', 'success');
                
            } catch (error) {
                console.error('Error updating branding request:', error);
                showToast('Error updating request', 'error');
            }
        }
    }

    function contactCustomer(phone) {
        const cleanPhone = phone.replace(/^0/, '254');
        window.open(`https://wa.me/${cleanPhone}`, '_blank');
    }

    // ===== ANALYTICS =====
    function renderAnalytics() {
        const totalSales = orders.reduce((sum, o) => sum + o.total, 0);
        const totalItems = orders.reduce((sum, o) => sum + (o.items?.length || 0), 0);
        
        // Category sales
        const categorySales = {};
        products.forEach(p => {
            categorySales[p.category] = 0;
        });
        
        orders.forEach(order => {
            order.items?.forEach(item => {
                const product = products.find(p => p.name === item.name);
                if (product) {
                    categorySales[product.category] = (categorySales[product.category] || 0) + item.quantity;
                }
            });
        });
        
        const html = `
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Revenue</h3>
                        <div class="stat-number">Ksh ${totalSales.toLocaleString()}</div>
                    </div>
                    <div class="stat-icon"><i class="fas fa-chart-line"></i></div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Products Sold</h3>
                        <div class="stat-number">${totalItems}</div>
                    </div>
                    <div class="stat-icon"><i class="fas fa-box"></i></div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Avg Order Value</h3>
                        <div class="stat-number">Ksh ${orders.length ? Math.round(totalSales / orders.length) : 0}</div>
                    </div>
                    <div class="stat-icon"><i class="fas fa-calculator"></i></div>
                </div>
                <div class="stat-card">
                    <div class="stat-info">
                        <h3>Branding Requests</h3>
                        <div class="stat-number">${brandingRequests.length}</div>
                    </div>
                    <div class="stat-icon"><i class="fas fa-palette"></i></div>
                </div>
            </div>
            
            <div class="table-container">
                <div class="table-header">
                    <h3>Sales by Category</h3>
                </div>
                
                <table>
                    <thead>
                        <tr>
                            <th>Category</th>
                            <th>Units Sold</th>
                            <th>% of Total</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${Object.entries(categorySales).map(([category, sold]) => `
                            <tr>
                                <td>${category}</td>
                                <td>${sold}</td>
                                <td>${totalItems ? Math.round(sold / totalItems * 100) : 0}%</td>
                            </tr>
                        `).join('')}
                    </tbody>
                </table>
            </div>
            
            <div class="table-container">
                <div class="table-header">
                    <h3>Top Selling Products</h3>
                </div>
                
                <table>
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Category</th>
                            <th>Units Sold</th>
                            <th>Revenue</th>
                        </tr>
                    </thead>
                    <tbody>
                        ${products.map(product => {
                            const sold = orders.reduce((total, order) => {
                                const item = order.items?.find(i => i.name === product.name);
                                return total + (item?.quantity || 0);
                            }, 0);
                            return `
                                <tr>
                                    <td>${product.name}</td>
                                    <td>${product.category}</td>
                                    <td>${sold}</td>
                                    <td>Ksh ${(sold * product.price).toLocaleString()}</td>
                                </tr>
                            `;
                        }).sort((a, b) => b.sold - a.sold).join('')}
                    </tbody>
                </table>
            </div>
        `;
        
        document.getElementById('contentArea').innerHTML = html;
    }

    // ===== UTILITY FUNCTIONS =====
    function toggleSidebar() {
        document.getElementById('sidebar').classList.toggle('active');
    }

    function showToast(message, type) {
        const container = document.getElementById('toastContainer');
        const toast = document.createElement('div');
        toast.className = `toast ${type === 'error' ? 'error' : ''}`;
        toast.innerHTML = `
            <i class="fas ${type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle'}"></i>
            <div>${message}</div>
        `;
        container.appendChild(toast);
        setTimeout(() => toast.remove(), 3000);
    }

    function globalSearch() {
        const term = document.getElementById('globalSearch').value.toLowerCase();
        if (term.length < 2) return;
        
        const productResults = products.filter(p => p.name.toLowerCase().includes(term));
        const orderResults = orders.filter(o => o.id.toLowerCase().includes(term) || o.customer_name.toLowerCase().includes(term));
        
        if (productResults.length > 0 || orderResults.length > 0) {
            showToast(`Found ${productResults.length} products, ${orderResults.length} orders`, 'info');
        }
    }

    // Check login status on load
    (function() {
        if (localStorage.getItem('adminLoggedIn') === 'true') {
            document.getElementById('loginPage').style.display = 'none';
            document.getElementById('dashboard').style.display = 'flex';
            loadAllData();
            setupRealtimeSubscriptions();
        }
    })();
</script>
